<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío 2 - Control de Presupuesto</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <div class="contenedor-principal">
        
        <header class="encabezado">
            <h1 id="titulo-presupuesto" class="titulo-principal">Presupuesto de...</h1>
            <div id="monto-disponible" class="monto-total">$ 0.00</div>
            
            <div class="resumen-container">
                <div class="cuadro-resumen cuadro-ingresos">
                    <span class="etiqueta">INGRESOS</span>
                    <span id="total-ingresos" class="monto-resumen">+ 0.00</span>
                </div>
                <div class="cuadro-resumen cuadro-egresos">
                    <span class="etiqueta">EGRESOS</span>
                    <div class="egreso-detalle">
                        <span id="total-egresos" class="monto-resumen">- 0.00</span>
                        <span id="porcentaje-total" class="porcentaje-badge">0%</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="seccion-formulario">
            <form id="formulario-transaccion">
                <div class="fila-formulario">
                    <div class="col-select">
                        <select id="tipo-transaccion" class="input-estilo">
                            <option value="ingreso" selected>+</option>
                            <option value="egreso">-</option>
                        </select>
                    </div>
                    <div class="col-desc">
                        <input type="text" id="descripcion" class="input-estilo" placeholder="Descripción (ej. Salario, Renta...)" required>
                    </div>
                    <div class="col-monto">
                        <input type="number" step="0.01" id="monto" class="input-estilo" placeholder="Monto" required>
                    </div>
                    <div class="col-btn">
                        <button type="submit" id="btn-agregar" class="btn-check">ok</button>
                    </div>
                </div>
            </form>
        </section>

        <section class="seccion-detalles">
            <div class="tab-system">
                <input type="radio" name="tab-control" id="tab1-radio" checked>
                <input type="radio" name="tab-control" id="tab2-radio">

                <div class="tab-header">
                    <label for="tab1-radio" class="tab-label label-ingreso">INGRESOS</label>
                    <label for="tab2-radio" class="tab-label label-egreso">EGRESOS</label>
                </div>

                <div class="tab-content">
                    <div id="contenido-ingresos" class="content-pane">
                        <ul id="lista-ingresos" class="lista-items">
                            <li class="item-vacio">No hay registros de ingresos...</li>
                        </ul>
                    </div>
                    
                    <div id="contenido-egresos" class="content-pane">
                        <ul id="lista-egresos" class="lista-items">
                            <li class="item-vacio">No hay registros de egresos...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="js/logica.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
